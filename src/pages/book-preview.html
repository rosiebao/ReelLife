<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Preview your book">
  <title>Your Book Preview - ReelLife</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .book-preview-page {
      background: var(--color-white);
      min-height: 100vh;
      padding: 1rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .back-button {
      color: var(--color-navy);
      font-size: 1.5rem;
      cursor: pointer;
      background: none;
      border: none;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .save-button {
      color: var(--color-navy);
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0.5rem 1rem;
    }

    .book-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .book-3d {
      width: 280px;
      height: 360px;
      position: relative;
      margin-bottom: 2rem;
      transform: perspective(1000px) rotateY(-15deg);
      transition: transform 0.3s ease;
    }

    .book-3d:hover {
      transform: perspective(1000px) rotateY(-10deg);
    }

    .book-cover {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1E2A47 0%, #2D3F5F 100%);
      border-radius: 0.5rem;
      box-shadow:
        20px 20px 40px rgba(0, 0, 0, 0.3),
        -5px 0 20px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      color: var(--color-gold);
    }

    .book-title {
      font-size: 2rem;
      font-family: var(--font-serif);
      text-align: center;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .book-subtitle {
      font-size: 1rem;
      text-align: center;
      margin-bottom: 2rem;
      opacity: 0.9;
    }

    .book-author {
      font-size: 1.125rem;
      text-align: center;
      margin-top: auto;
    }

    .book-spine {
      position: absolute;
      right: -30px;
      top: 0;
      width: 30px;
      height: 100%;
      background: linear-gradient(90deg, #2D3F5F 0%, #1E2A47 100%);
      border-radius: 0 0.5rem 0.5rem 0;
    }

    .book-pages {
      position: absolute;
      right: -28px;
      top: 5px;
      width: 28px;
      height: calc(100% - 10px);
      background: linear-gradient(90deg, #F5F5F5 0%, #E5E5E5 100%);
      border-radius: 0 0.25rem 0.25rem 0;
      box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.1);
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 500px;
    }

    .action-card {
      background: var(--color-light-bg);
      border-radius: var(--radius-lg);
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .action-card:hover {
      border-color: var(--color-gold);
      box-shadow: var(--shadow-md);
    }

    .action-icon {
      font-size: 2.5rem;
      color: var(--color-text-gray);
    }

    .action-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--color-navy);
      text-align: center;
    }

    .export-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 500px;
    }

    .export-icon {
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="book-preview-page">
    <div class="page-header">
      <button class="back-button" onclick="window.history.back()">‹</button>
      <h1 class="page-title">Your Book Preview</h1>
      <button class="save-button">Save</button>
    </div>

    <div class="book-container">
      <div class="book-3d">
        <div class="book-cover">
          <h2 class="book-title">My Life<br>My Story</h2>
          <p class="book-subtitle">A MEMOIR</p>
          <p class="book-author">By Kevin Lee</p>
        </div>
        <div class="book-pages"></div>
        <div class="book-spine"></div>
      </div>

      <div class="action-grid">
        <div class="action-card">
          <div class="action-icon">📋</div>
          <div class="action-title">Table of Contents</div>
        </div>

        <div class="action-card">
          <div class="action-icon">👁️</div>
          <div class="action-title">Preview Sample</div>
        </div>
      </div>

      <div class="export-buttons">
        <button class="btn btn-outline btn-full btn-large">
          <span class="export-icon">📄</span>
          Export PDF
        </button>

        <button class="btn btn-outline btn-full btn-large">
          <span class="export-icon">📚</span>
          Export EPUB
        </button>

        <button class="btn btn-outline btn-full btn-large">
          <span class="export-icon">🎧</span>
          Export Audiobook
        </button>
      </div>
    </div>
  </div>
</body>
</html>
