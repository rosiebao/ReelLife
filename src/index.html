<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ReelLife - Preserve your story, preserve your legacy. Turn your life experiences into meaningful stories.">
  <title>ReelLife - Preserve Your Story, Preserve Your Legacy</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* Landing Page Specific Styles */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.5)),
                  url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%23A0A0A0" width="1200" height="800"/></svg>');
      background-size: cover;
      background-position: center;
      color: white;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .landing-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #1E2A47 0%, #2D3F5F 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .landing-logo-icon {
      font-size: 3.5rem;
    }

    .landing-title {
      font-size: 2.5rem;
      font-family: var(--font-serif);
      color: white;
      margin-bottom: 1rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .landing-tagline {
      font-size: 1.25rem;
      font-weight: 600;
      color: white;
      margin-bottom: 1rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .landing-description {
      font-size: 1rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.95);
      margin-bottom: 2.5rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      text-shadow: 0 1px 5px rgba(0,0,0,0.3);
    }

    .landing-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 400px;
      margin: 0 auto 2rem;
    }

    .landing-footer {
      margin-top: auto;
      padding-top: 2rem;
    }

    .landing-footer a {
      color: white;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .landing-footer a:hover {
      color: var(--color-gold);
    }

    .landing-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    @media (min-width: 768px) {
      .landing-title {
        font-size: 3rem;
      }

      .landing-tagline {
        font-size: 1.5rem;
      }

      .landing-description {
        font-size: 1.125rem;
      }

      .landing-actions {
        flex-direction: row;
        max-width: 600px;
      }
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="landing-logo">
      <span class="landing-logo-icon">📖</span>
    </div>

    <h1 class="landing-title">ReelLife</h1>

    <p class="landing-tagline">
      Preserve Your Story.<br>
      Preserve Your Legacy.
    </p>

    <p class="landing-description">
      Turn your life experiences into meaningful stories for your autobiography, your family history, and the community archives of tomorrow.
    </p>

    <div class="landing-actions">
      <a href="pages/signup.html" class="btn btn-primary btn-full btn-large">Create Account</a>
      <a href="pages/login.html" class="btn btn-outline btn-full btn-large">Sign In</a>
    </div>

    <div class="landing-footer">
      <p>Already have an account? <a href="pages/login.html"><strong>Sign In</strong></a></p>
    </div>
  </div>
</body>
</html>
